syntax = "proto3";

package opendut.model.viper;

import "opendut/model/util/uuid.proto";
import "opendut/model/viper/source.proto";
import "opendut/viper/rt/test_suite.proto";
import "opendut/model/cluster/cluster.proto";


message ViperTestDescriptor {
  ViperTestId id = 1;
  ViperTestName name = 2;
  opendut.model.viper.ViperSourceId source = 3;
  opendut.viper.rt.test_suite.ViperTestSuiteIdentifier suite = 4;
  opendut.model.cluster.ClusterId cluster = 5;
  repeated ViperTestParameter parameters = 6;
}

message ViperTestId {
  opendut.model.util.Uuid uuid = 1;
}

message ViperTestName {
  string value = 1;
}

message ViperTestParameter {
  string key = 1;
  ViperTestParameterValue value = 2;
}

message ViperTestParameterValue {
  oneof kind {
    bool boolean = 1;
    int64 number = 2;
    string text = 3;
  }
}
