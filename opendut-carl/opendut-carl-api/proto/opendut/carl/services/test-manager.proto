    DeleteViperRunDeploymentFailureInternal internal = 4;
  }
}

message DeleteViperRunDeploymentFailureRunNotFound {
  opendut.model.viper.ViperRunId run_id = 1;
}

message DeleteViperRunDeploymentFailureInternal {
  opendut.model.viper.ViperRunId run_id = 1;
