message ListViperRunDeploymentsRequest {}

message ListViperRunDeploymentsResponse {
  oneof reply {
    ListViperRunDeploymentsSuccess success = 1;
    ListViperRunDeploymentsFailure failure = 2;
  }
}

message ListViperRunDeploymentsSuccess {
